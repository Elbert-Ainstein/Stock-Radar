# Single Scout — run one scout manually, results feed into next Analyst Rebuild
#
# Manual trigger: Actions tab → "Single Scout" → pick scout → "Run workflow"

name: Single Scout

on:
  workflow_dispatch:
    inputs:
      scout:
        description: "Which scout to run"
        required: true
        type: choice
        options:
          - quant
          - news
          - social
          - insider
          - catalyst
          - fundamentals
          - moat
          - filings
          - youtube

concurrency:
  group: stock-radar-scout-${{ github.event.inputs.scout }}
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ${{ github.event.inputs.scout }} scout
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -c "from scout_${{ github.event.inputs.scout }} import main; main()"
