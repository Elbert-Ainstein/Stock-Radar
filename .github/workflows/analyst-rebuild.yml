# Analyst Rebuild — expensive phase (uses Claude + Perplexity tokens)
# Runs once daily at 7am UTC (after the morning scout refresh).
# Aggregates all existing signals, generates composite scores, and
# rebuilds target price models for all 50 watchlist stocks.
#
# Manual trigger: Actions tab → "Analyst Rebuild" → "Run workflow"

name: Analyst Rebuild

on:
  schedule:
    - cron: "0 7 * * *"       # 7am UTC daily (1 hour after scout refresh)
  workflow_dispatch:           # manual trigger button

concurrency:
  group: stock-radar-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 120       # model generation for 50 stocks can take a while

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analyst rebuild
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run_pipeline.py --rebuild-only

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyst-rebuild-${{ github.run_number }}
          path: data/.pipeline-progress
          retention-days: 7
