<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Radar — Full Stack Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    color: #e2e8f0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── Canvas ── */
  #canvas {
    width: 100%;
    height: 100%;
    position: relative;
    cursor: grab;
  }
  #canvas.dragging { cursor: grabbing; }

  #viewport {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* ── Nodes ── */
  .node {
    position: absolute;
    border-radius: 14px;
    padding: 14px 18px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s;
    user-select: none;
    min-width: 140px;
    text-align: center;
    z-index: 2;
  }
  .node:hover { transform: scale(1.04); z-index: 10; }

  .node .label {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .node .sub {
    font-size: 10.5px;
    opacity: 0.7;
    margin-top: 3px;
    line-height: 1.3;
    white-space: pre-line;
  }

  /* ── Node types ── */
  .node.core {
    background: linear-gradient(135deg, #1e3a5f, #0f2744);
    border: 2px solid #3b82f6;
    box-shadow: 0 0 20px rgba(59,130,246,0.25);
  }
  .node.core:hover { box-shadow: 0 0 35px rgba(59,130,246,0.45); }

  .node.scout {
    background: linear-gradient(135deg, #1a3a2a, #0f2a1a);
    border: 2px solid #22c55e;
    box-shadow: 0 0 15px rgba(34,197,94,0.2);
  }
  .node.scout:hover { box-shadow: 0 0 30px rgba(34,197,94,0.4); }

  .node.analysis {
    background: linear-gradient(135deg, #3b1f4a, #241035);
    border: 2px solid #a855f7;
    box-shadow: 0 0 15px rgba(168,85,247,0.2);
  }
  .node.analysis:hover { box-shadow: 0 0 30px rgba(168,85,247,0.4); }

  .node.model {
    background: linear-gradient(135deg, #4a2d1a, #352010);
    border: 2px solid #f59e0b;
    box-shadow: 0 0 15px rgba(245,158,11,0.2);
  }
  .node.model:hover { box-shadow: 0 0 30px rgba(245,158,11,0.4); }

  .node.frontend {
    background: linear-gradient(135deg, #1a2a4a, #101a35);
    border: 2px solid #06b6d4;
    box-shadow: 0 0 15px rgba(6,182,212,0.2);
  }
  .node.frontend:hover { box-shadow: 0 0 30px rgba(6,182,212,0.4); }

  .node.db {
    background: linear-gradient(135deg, #3a1a2a, #25101a);
    border: 2px solid #f43f5e;
    box-shadow: 0 0 15px rgba(244,63,94,0.2);
  }
  .node.db:hover { box-shadow: 0 0 30px rgba(244,63,94,0.4); }

  .node.api {
    background: linear-gradient(135deg, #2a2a1a, #1a1a10);
    border: 2px solid #eab308;
    box-shadow: 0 0 15px rgba(234,179,8,0.15);
  }
  .node.api:hover { box-shadow: 0 0 30px rgba(234,179,8,0.35); }

  .node.ext {
    background: linear-gradient(135deg, #1a2020, #101515);
    border: 2px dashed #64748b;
    box-shadow: 0 0 10px rgba(100,116,139,0.15);
  }

  /* ── Section labels ── */
  .section-label {
    position: absolute;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.3;
    z-index: 0;
    user-select: none;
    pointer-events: none;
  }

  /* ── SVG arrows ── */
  svg.arrows {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: visible;
  }
  svg.arrows line, svg.arrows path {
    stroke-width: 1.8;
    fill: none;
  }
  .arrow-scout { stroke: #22c55e; opacity: 0.5; }
  .arrow-data  { stroke: #3b82f6; opacity: 0.5; }
  .arrow-analysis { stroke: #a855f7; opacity: 0.5; }
  .arrow-model { stroke: #f59e0b; opacity: 0.5; }
  .arrow-frontend { stroke: #06b6d4; opacity: 0.5; }
  .arrow-db    { stroke: #f43f5e; opacity: 0.5; }
  .arrow-api   { stroke: #eab308; opacity: 0.4; }

  /* ── Legend ── */
  #legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(10,14,23,0.92);
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 14px 18px;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  #legend h3 {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 11.5px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ── Controls ── */
  #controls {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 8px;
    z-index: 100;
  }
  #controls button {
    background: rgba(10,14,23,0.9);
    border: 1px solid #334155;
    color: #e2e8f0;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.2s;
    backdrop-filter: blur(10px);
  }
  #controls button:hover { border-color: #3b82f6; }

  /* ── Title ── */
  #title {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
  }
  #title h1 {
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #title p {
    font-size: 11px;
    color: #64748b;
    margin-top: 3px;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: rgba(15,23,42,0.96);
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 14px 18px;
    max-width: 320px;
    font-size: 12px;
    line-height: 1.5;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    backdrop-filter: blur(12px);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip h4 {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  #tooltip .tt-file {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    color: #64748b;
    margin-bottom: 6px;
  }
  #tooltip .tt-body { color: #cbd5e1; }
  #tooltip .tt-tables {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #1e293b;
    font-size: 10.5px;
    color: #94a3b8;
  }
  #tooltip .tt-tables span { color: #f43f5e; font-weight: 600; }
</style>
</head>
<body>

<div id="title">
  <h1>Stock Radar Architecture</h1>
  <p>Scroll to zoom — Drag to pan — Hover for details</p>
</div>

<div id="controls">
  <button onclick="resetView()">Reset View</button>
  <button onclick="zoomIn()">Zoom +</button>
  <button onclick="zoomOut()">Zoom &minus;</button>
</div>

<div id="legend">
  <h3>Legend</h3>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Core Infrastructure</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Scout (Data Collection)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div> Analysis & Scoring</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Target Engine & Modeling</div>
  <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div> Frontend (Next.js)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f43f5e"></div> Supabase Database</div>
  <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div> API Routes</div>
  <div class="legend-item"><div class="legend-dot" style="background:#64748b"></div> External Services</div>
</div>

<div id="tooltip">
  <h4 id="tt-title"></h4>
  <div class="tt-file" id="tt-file"></div>
  <div class="tt-body" id="tt-body"></div>
  <div class="tt-tables" id="tt-tables"></div>
</div>

<div id="canvas">
  <div id="viewport">
    <svg class="arrows" id="arrows" width="4000" height="2000" viewBox="0 0 4000 2000" style="position:absolute;top:0;left:0;width:4000px;height:2000px;"></svg>
  </div>
</div>

<script>

const nodes = [

  { id: "alphav", x: 40, y: 820, type: "ext", label: "Alpha Vantage", sub: "fallback data", tooltip: { file: "ALPHA_VANTAGE_API_KEY (optional)", body: "Backup source for stock data when Yahoo Finance is rate-limited or unavailable.", tables: "" } },

//  RENDERING
// ═══════════════════════════════════════════════════════
const viewport = document.getElementById("viewport");
const canvas = document.getElementById("canvas");
const svgEl = document.getElementById("arrows");
const tooltip = document.getElementById("tooltip");
const ttTitle = document.getElementById("tt-title");
const ttFile = document.getElementById("tt-file");
const ttBody = document.getElementById("tt-body");
const ttTables = document.getElementById("tt-tables");

// Create nodes
const nodeEls = {};
nodes.forEach(n => {
  const div = document.createElement("div");
  div.className = `node ${n.type}`;
  div.style.left = n.x + "px";
  div.style.top = n.y + "px";
  div.innerHTML = `<div class="label">${n.label}</div><div class="sub">${n.sub}</div>`;
  div.dataset.id = n.id;
  viewport.appendChild(div);
  nodeEls[n.id] = div;

  // Tooltip
  div.addEventListener("mouseenter", (e) => {
    ttTitle.textContent = n.label;
    ttFile.textContent = n.tooltip.file;
    ttBody.textContent = n.tooltip.body;
    ttTables.innerHTML = n.tooltip.tables ? `<span>DB:</span> ${n.tooltip.tables}` : "";
    tooltip.classList.add("visible");
  });
  div.addEventListener("mousemove", (e) => {
    const tx = Math.min(e.clientX + 16, window.innerWidth - 340);
    const ty = Math.min(e.clientY + 16, window.innerHeight - 200);
    tooltip.style.left = tx + "px";
    tooltip.style.top = ty + "px";
  });
  div.addEventListener("mouseleave", () => {
    tooltip.classList.remove("visible");
  });
});

// Section labels

// Draw arrows after layout
// Cache measured sizes so arrows can redraw fast
const nodeSizes = {};
function measureNodes() {
  Object.entries(nodeEls).forEach(([id, el]) => {
    nodeSizes[id] = { w: el.offsetWidth, h: el.offsetHeight };
  });
}

function getNodeCenter(id) {
  const el = nodeEls[id];
  if (!el) return { x: 0, y: 0 };
  const sz = nodeSizes[id] || { w: 140, h: 50 };
  const x = parseFloat(el.style.left) + sz.w / 2;
  const y = parseFloat(el.style.top) + sz.h / 2;
  return { x, y };
}

// Find the point on a rectangle's edge closest to an external target point
function edgePoint(cx, cy, w, h, tx, ty) {
  const dx = tx - cx, dy = ty - cy;
  if (dx === 0 && dy === 0) return { x: cx, y: cy };
  const hw = w / 2 + 4, hh = h / 2 + 4; // 4px gap from border
  const sx = hw / Math.abs(dx), sy = hh / Math.abs(dy);
  const s = Math.min(sx, sy);
  return { x: cx + dx * s, y: cy + dy * s };
}

function drawArrows() {
  svgEl.innerHTML = "";

  // Arrowhead markers
  const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
  const colors = {
    "arrow-scout": "#22c55e",
    "arrow-data": "#3b82f6",
    "arrow-analysis": "#a855f7",
    "arrow-model": "#f59e0b",
    "arrow-frontend": "#06b6d4",
    "arrow-db": "#f43f5e",
    "arrow-api": "#eab308",
  };
  Object.entries(colors).forEach(([cls, color]) => {
    const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
    marker.setAttribute("id", `head-${cls}`);
    marker.setAttribute("markerWidth", "8");
    marker.setAttribute("markerHeight", "6");
    marker.setAttribute("refX", "8");
    marker.setAttribute("refY", "3");
    marker.setAttribute("orient", "auto");
    const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
    poly.setAttribute("points", "0 0, 8 3, 0 6");
    poly.setAttribute("fill", color);
    poly.setAttribute("opacity", "0.6");
    marker.appendChild(poly);
    defs.appendChild(marker);
  });
  svgEl.appendChild(defs);

  connections.forEach(c => {
    const fc = getNodeCenter(c.from);
    const tc = getNodeCenter(c.to);
    const fsz = nodeSizes[c.from] || { w: 140, h: 50 };
    const tsz = nodeSizes[c.to] || { w: 140, h: 50 };
    const p1 = edgePoint(fc.x, fc.y, fsz.w, fsz.h, tc.x, tc.y);
    const p2 = edgePoint(tc.x, tc.y, tsz.w, tsz.h, fc.x, fc.y);

    // Slight curve for parallel arrows
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const curveAmt = Math.min(30, dist * 0.15);
    // Perpendicular offset
    const nx = -dy / (dist || 1) * curveAmt;
    const ny = dx / (dist || 1) * curveAmt;
    const mx = (p1.x + p2.x) / 2 + nx;
    const my = (p1.y + p2.y) / 2 + ny;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", `M ${p1.x} ${p1.y} Q ${mx} ${my} ${p2.x} ${p2.y}`);
    path.setAttribute("class", c.cls);
    path.setAttribute("marker-end", `url(#head-${c.cls})`);
    svgEl.appendChild(path);
  });
}

// Must wait for full layout before measuring nodes and drawing arrows
window.addEventListener("load", () => {
  measureNodes();
  drawArrows();
});
// Also try after a short delay as backup
setTimeout(() => { measureNodes(); drawArrows(); }, 200);

// ═══════════════════════════════════════════════════════
//  PAN & ZOOM
// ═══════════════════════════════════════════════════════
let scale = 0.72;
let panX = -80;
let panY = 0;
let isDragging = false;
let dragStartX, dragStartY;

function applyTransform() {
  viewport.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}
applyTransform();

canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const newScale = Math.max(0.2, Math.min(2.5, scale * delta));
  // Zoom toward cursor
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  panX = cx - (cx - panX) * (newScale / scale);
  panY = cy - (cy - panY) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

canvas.addEventListener("mousedown", (e) => {
  if (e.target.closest(".node")) return;
  isDragging = true;
  dragStartX = e.clientX - panX;
  dragStartY = e.clientY - panY;
  canvas.classList.add("dragging");
});

window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  panX = e.clientX - dragStartX;
  panY = e.clientY - dragStartY;
  applyTransform();
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  canvas.classList.remove("dragging");
});

function resetView() { scale = 0.72; panX = -80; panY = 0; applyTransform(); }
function zoomIn() { scale = Math.min(2.5, scale * 1.2); applyTransform(); }
function zoomOut() { scale = Math.max(0.2, scale / 1.2); applyTransform(); }
</script>
