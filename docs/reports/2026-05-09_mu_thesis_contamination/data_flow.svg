<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
    <marker id="arrow-bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <style>
      .heading { font-size: 22px; font-weight: 700; fill: #1c1a17; }
      .subheading { font-size: 13px; fill: #57534e; font-style: italic; }
      .lane { fill: #f6f4ec; stroke: #dfd9c4; stroke-width: 1; }
      .lane-label { font-size: 13px; font-weight: 700; fill: #57534e; text-transform: uppercase; letter-spacing: 0.05em; }
      .node { fill: #fcfcfa; stroke: #847e6f; stroke-width: 1.5; rx: 6; }
      .node-clean { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 6; }
      .node-bug { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 6; }
      .node-fixed { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 6; }
      .node-title { font-size: 13px; font-weight: 700; fill: #0a0a09; }
      .node-text { font-size: 11px; fill: #525252; }
      .node-mono { font-family: ui-monospace, monospace; font-size: 10.5px; fill: #525252; }
      .arrow-line { stroke: #525252; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .arrow-bad { stroke: #dc2626; stroke-width: 2; fill: none; marker-end: url(#arrow-bad); stroke-dasharray: 5 3; }
      .arrow-good { stroke: #16a34a; stroke-width: 2; fill: none; marker-end: url(#arrow-good); }
      .bug-label { font-size: 11px; font-weight: 700; fill: #dc2626; }
      .fix-label { font-size: 11px; font-weight: 700; fill: #16a34a; }
    </style>
  </defs>

  <rect width="1500" height="1000" fill="#fcfcfa"/>

  <text x="750" y="34" text-anchor="middle" class="heading">MU thesis pipeline — data flow with contamination points</text>
  <text x="750" y="56" text-anchor="middle" class="subheading">Each contamination path traced to a specific file:line. Green = working. Red = active bug. Blue = already fixed.</text>

  <!-- Lanes -->
  <g>
    <rect class="lane" x="40" y="90" width="1420" height="160"/>
    <text class="lane-label" x="60" y="115">1. Data acquisition</text>

    <rect class="lane" x="40" y="270" width="1420" height="160"/>
    <text class="lane-label" x="60" y="295">2. Validation + override layers</text>

    <rect class="lane" x="40" y="450" width="1420" height="200"/>
    <text class="lane-label" x="60" y="475">3. Engine + thesis prompt construction</text>

    <rect class="lane" x="40" y="670" width="1420" height="180"/>
    <text class="lane-label" x="60" y="695">4. LLM output + memory persistence</text>
  </g>

  <!-- Lane 1: Data acquisition -->
  <g>
    <!-- yfinance -->
    <rect class="node-bug" x="100" y="140" width="200" height="80" rx="6"/>
    <text class="node-title" x="200" y="162" text-anchor="middle">yfinance provider</text>
    <text class="node-text" x="200" y="180" text-anchor="middle">Returns inflated 1Q26 = $23.86B</text>
    <text class="node-mono" x="200" y="198" text-anchor="middle">scripts/finance_data.py:641</text>
    <text class="bug-label" x="200" y="214" text-anchor="middle">Bug: $23.86B vs 10-Q $13.64B</text>

    <!-- EODHD -->
    <rect class="node-bug" x="380" y="140" width="200" height="80" rx="6"/>
    <text class="node-title" x="480" y="162" text-anchor="middle">EODHD provider</text>
    <text class="node-text" x="480" y="180" text-anchor="middle">Returns SAME inflated $23.86B</text>
    <text class="node-mono" x="480" y="198" text-anchor="middle">scripts/finance_data.py:735</text>
    <text class="bug-label" x="480" y="214" text-anchor="middle">Bug: shared upstream syndication</text>

    <!-- AlphaVantage -->
    <rect class="node-bug" x="660" y="140" width="200" height="80" rx="6"/>
    <text class="node-title" x="760" y="162" text-anchor="middle">AlphaVantage provider</text>
    <text class="node-text" x="760" y="180" text-anchor="middle">Returns SAME $23.86B</text>
    <text class="node-mono" x="760" y="198" text-anchor="middle">scripts/finance_data.py:983</text>
    <text class="bug-label" x="760" y="214" text-anchor="middle">All 3 providers agree, all wrong</text>

    <!-- 10-Q (truth) -->
    <rect class="node-clean" x="940" y="140" width="200" height="80" rx="6"/>
    <text class="node-title" x="1040" y="162" text-anchor="middle">10-Q filing (truth)</text>
    <text class="node-text" x="1040" y="180" text-anchor="middle">Q1 FY26: $13.643B revenue</text>
    <text class="node-mono" x="1040" y="198" text-anchor="middle">SEC EDGAR mu-20251127.htm</text>
    <text class="fix-label" x="1040" y="214" text-anchor="middle">Source of truth</text>

    <!-- News (Perplexity) -->
    <rect class="node" x="1220" y="140" width="200" height="80" rx="6"/>
    <text class="node-title" x="1320" y="162" text-anchor="middle">News + earnings calls</text>
    <text class="node-text" x="1320" y="180" text-anchor="middle">"DRAM operating margins of 77%"</text>
    <text class="node-mono" x="1320" y="198" text-anchor="middle">via Perplexity scout</text>
    <text class="bug-label" x="1320" y="214" text-anchor="middle">Ambiguous narrative for regex</text>
  </g>

  <!-- Lane 2: Validation + overrides -->
  <g>
    <!-- Provider override -->
    <rect class="node-fixed" x="100" y="320" width="240" height="80" rx="6"/>
    <text class="node-title" x="220" y="342" text-anchor="middle">Provider override config</text>
    <text class="node-text" x="220" y="360" text-anchor="middle">MU → eodhd, skip yfinance</text>
    <text class="node-mono" x="220" y="378" text-anchor="middle">data_provider_overrides.json</text>
    <text class="fix-label" x="220" y="394" text-anchor="middle">✓ Working</text>

    <!-- Manual quarterly override -->
    <rect class="node-fixed" x="420" y="320" width="280" height="80" rx="6"/>
    <text class="node-title" x="560" y="342" text-anchor="middle">Manual quarterly override</text>
    <text class="node-text" x="560" y="360" text-anchor="middle">Patches all 11 line items for MU 1Q26</text>
    <text class="node-mono" x="560" y="378" text-anchor="middle">manual_quarterly_overrides.json</text>
    <text class="fix-label" x="560" y="394" text-anchor="middle">✓ Working (post-multi-stmt patch)</text>

    <!-- Sanity check -->
    <rect class="node-fixed" x="780" y="320" width="200" height="80" rx="6"/>
    <text class="node-title" x="880" y="342" text-anchor="middle">Revenue sanity check</text>
    <text class="node-text" x="880" y="360" text-anchor="middle">2x trailing / 2.5x YoY thresholds</text>
    <text class="node-mono" x="880" y="378" text-anchor="middle">_validate_quarterly_revenue</text>
    <text class="fix-label" x="880" y="394" text-anchor="middle">✓ 0 warnings post-patch</text>

    <!-- Forward drivers regex -->
    <rect class="node-bug" x="1060" y="320" width="360" height="80" rx="6"/>
    <text class="node-title" x="1240" y="342" text-anchor="middle">Forward-driver narrative regex</text>
    <text class="node-text" x="1240" y="360" text-anchor="middle">Bound 0 &lt; mid &lt; 100 (TOO LOOSE)</text>
    <text class="node-mono" x="1240" y="378" text-anchor="middle">forward_drivers.py:441</text>
    <text class="bug-label" x="1240" y="394" text-anchor="middle">Bug: matches 77% as op_margin</text>
  </g>

  <!-- Lane 3: Engine + thesis prompt -->
  <g>
    <!-- target_engine -->
    <rect class="node-bug" x="100" y="500" width="280" height="120" rx="6"/>
    <text class="node-title" x="240" y="524" text-anchor="middle">target_engine.py — DCF</text>
    <text class="node-text" x="240" y="544" text-anchor="middle">Reads forward drivers from Supabase,</text>
    <text class="node-text" x="240" y="560" text-anchor="middle">blends 77% with historical 45%.</text>
    <text class="node-text" x="240" y="576" text-anchor="middle">No sector-aware cap.</text>
    <text class="node-mono" x="240" y="596" text-anchor="middle">target_engine.py:833-840</text>
    <text class="bug-label" x="240" y="612" text-anchor="middle">Bug: ~+$230/share phantom value</text>

    <!-- VERIFIED_FINANCIALS block -->
    <rect class="node-clean" x="460" y="500" width="280" height="120" rx="6"/>
    <text class="node-title" x="600" y="524" text-anchor="middle">[VERIFIED_FINANCIALS]</text>
    <text class="node-text" x="600" y="544" text-anchor="middle">Built from patched fetch_financials</text>
    <text class="node-text" x="600" y="560" text-anchor="middle">data → injected into prompt.</text>
    <text class="node-mono" x="600" y="580" text-anchor="middle">_build_verified_financials_block</text>
    <text class="fix-label" x="600" y="600" text-anchor="middle">✓ Now correct (was contaminated</text>
    <text class="fix-label" x="600" y="614" text-anchor="middle">in 14:09 run, before multi-stmt patch)</text>

    <!-- MEMORY_SECTION -->
    <rect class="node-bug" x="820" y="500" width="280" height="120" rx="6"/>
    <text class="node-title" x="960" y="524" text-anchor="middle">[MEMORY_SECTION]</text>
    <text class="node-text" x="960" y="544" text-anchor="middle">Reads data/memory/MU.md verbatim.</text>
    <text class="node-text" x="960" y="560" text-anchor="middle">File now has $1,180 / HIGH / 30%</text>
    <text class="node-text" x="960" y="576" text-anchor="middle">in Thesis History + Trajectory.</text>
    <text class="node-mono" x="960" y="596" text-anchor="middle">run_thesis.py:656-659</text>
    <text class="bug-label" x="960" y="612" text-anchor="middle">⚠ PRIMARY contamination of LLM</text>

    <!-- Thesis prompt -->
    <rect class="node" x="1180" y="500" width="240" height="120" rx="6"/>
    <text class="node-title" x="1300" y="524" text-anchor="middle">V3.3 thesis prompt</text>
    <text class="node-text" x="1300" y="544" text-anchor="middle">[ANALYST_PROMPT] +</text>
    <text class="node-text" x="1300" y="560" text-anchor="middle">[VERIFIED_FINANCIALS] +</text>
    <text class="node-text" x="1300" y="576" text-anchor="middle">[MEMORY_SECTION]</text>
    <text class="node-mono" x="1300" y="596" text-anchor="middle">analyst_prompt.md @ TEMPERATURE=0.3</text>
    <text class="node-text" x="1300" y="614" text-anchor="middle" font-style="italic">→ contaminated by memory</text>
  </g>

  <!-- Lane 4: LLM + memory -->
  <g>
    <!-- Pipeline output -->
    <rect class="node-bug" x="100" y="720" width="240" height="100" rx="6"/>
    <text class="node-title" x="220" y="744" text-anchor="middle">Pipeline output: $1,180</text>
    <text class="node-text" x="220" y="764" text-anchor="middle">HIGH conviction, 30% position</text>
    <text class="node-text" x="220" y="780" text-anchor="middle">+58% upside vs $746.81 current</text>
    <text class="node-mono" x="220" y="800" text-anchor="middle">data/theses/MU_20260509_180954.md</text>
    <text class="bug-label" x="220" y="816" text-anchor="middle">Contaminated</text>

    <!-- Hand-paste output -->
    <rect class="node-clean" x="400" y="720" width="240" height="100" rx="6"/>
    <text class="node-title" x="520" y="744" text-anchor="middle">Hand-paste output: $855</text>
    <text class="node-text" x="520" y="764" text-anchor="middle">Modest +14.5% over 12 months</text>
    <text class="node-text" x="520" y="780" text-anchor="middle">"thesis has largely played out"</text>
    <text class="node-text" x="520" y="800" text-anchor="middle">No memory injection;</text>
    <text class="node-text" x="520" y="816" text-anchor="middle">no scout signal context.</text>

    <!-- Memory write-back -->
    <rect class="node-bug" x="700" y="720" width="280" height="100" rx="6"/>
    <text class="node-title" x="840" y="744" text-anchor="middle">Memory write-back</text>
    <text class="node-text" x="840" y="764" text-anchor="middle">After thesis run, append history row</text>
    <text class="node-text" x="840" y="780" text-anchor="middle">to data/memory/MU.md.</text>
    <text class="node-mono" x="840" y="800" text-anchor="middle">run_thesis.py:755-794</text>
    <text class="bug-label" x="840" y="816" text-anchor="middle">⚠ Self-perpetuating loop</text>

    <!-- Watchlist -->
    <rect class="node" x="1040" y="720" width="240" height="100" rx="6"/>
    <text class="node-title" x="1160" y="744" text-anchor="middle">Dashboard watchlist row</text>
    <text class="node-text" x="1160" y="764" text-anchor="middle">Shows $1,180 thesis, HIGH, 30%</text>
    <text class="node-text" x="1160" y="780" text-anchor="middle">drift +58%, last_run 14:09:54</text>
    <text class="node-mono" x="1160" y="800" text-anchor="middle">app/dashboard/Dashboard.tsx</text>
    <text class="node-text" x="1160" y="816" text-anchor="middle" font-style="italic">→ what user sees</text>
  </g>

  <!-- Connectors -->
  <!-- Lane 1 → Lane 2 -->
  <line x1="200" y1="220" x2="200" y2="320" class="arrow-line"/>
  <line x1="480" y1="220" x2="480" y2="320" class="arrow-line"/>
  <line x1="760" y1="220" x2="760" y2="320" class="arrow-line"/>
  <line x1="1040" y1="220" x2="640" y2="320" class="arrow-line"/>
  <line x1="1320" y1="220" x2="1240" y2="320" class="arrow-bad"/>

  <!-- Lane 2 → Lane 3 -->
  <line x1="220" y1="400" x2="600" y2="500" class="arrow-good"/>
  <line x1="560" y1="400" x2="600" y2="500" class="arrow-good"/>
  <line x1="880" y1="400" x2="600" y2="500" class="arrow-good"/>
  <line x1="1240" y1="400" x2="240" y2="500" class="arrow-bad"/>

  <!-- Memory → MEMORY_SECTION (Lane 4 historical → Lane 3) -->
  <path d="M 840 720 Q 840 660 960 620" class="arrow-bad"/>
  <text x="850" y="668" class="bug-label">stored prior bad thesis</text>

  <!-- Lane 3 → Lane 4 -->
  <line x1="600" y1="620" x2="220" y2="720" class="arrow-bad"/>
  <line x1="1300" y1="620" x2="1160" y2="720" class="arrow-line"/>

  <!-- Pipeline → memory write -->
  <line x1="340" y1="770" x2="700" y2="770" class="arrow-bad"/>
  <text x="430" y="765" class="bug-label">contaminated output → memory file</text>

  <!-- Footer -->
  <rect x="40" y="880" width="1420" height="100" fill="#fffbeb" stroke="#d97706" rx="6"/>
  <text x="60" y="906" font-size="13" font-weight="700" fill="#0a0a09">Critical insight: the contamination self-perpetuates.</text>
  <text x="60" y="928" font-size="11.5" fill="#1c1a17">Each thesis run writes its output to data/memory/{TICKER}.md. The next run reads that file as anchoring context. If a bad run produces a wrong target,</text>
  <text x="60" y="944" font-size="11.5" fill="#1c1a17">it is now embedded in the prior-context the LLM sees on every subsequent run for that ticker — until manually cleaned. This is a hidden state machine.</text>
  <text x="60" y="966" font-size="11.5" fill="#1c1a17">Fix: clean data/memory/MU.md surgically, then re-run thesis. Otherwise the bad target keeps reasserting itself.</text>
</svg>
