<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 850" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <style>
      .heading { font-size: 22px; font-weight: 700; fill: #1c1a17; }
      .subheading { font-size: 13px; fill: #57534e; font-style: italic; }
      .axis { stroke: #847e6f; stroke-width: 1.5; }
      .grid { stroke: #dfd9c4; stroke-width: 0.5; stroke-dasharray: 2 3; }
      .v33 { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .v34 { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .v4 { fill: #d1fae5; stroke: #16a34a; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1300" height="850" fill="#fcfcfa"/>
  <text x="650" y="34" text-anchor="middle" class="heading">Cost vs empirical evidence — three architectures</text>
  <text x="650" y="56" text-anchor="middle" class="subheading">X-axis: monthly operating cost (15-ticker watchlist, weekly refresh). Y-axis: empirical evidence the architecture works as intended.</text>

  <!-- axes -->
  <line x1="120" y1="650" x2="1180" y2="650" class="axis"/>
  <line x1="120" y1="130" x2="120" y2="650" class="axis"/>

  <text x="650" y="700" text-anchor="middle" font-size="13" fill="#1c1a17" font-weight="700">Monthly cost (15 tickers × 4 refreshes / month) →</text>
  <text x="120" y="675" text-anchor="middle" font-size="11" fill="#525252">$0</text>
  <text x="473" y="675" text-anchor="middle" font-size="11" fill="#525252">$500</text>
  <text x="827" y="675" text-anchor="middle" font-size="11" fill="#525252">$1,000</text>
  <text x="1180" y="675" text-anchor="middle" font-size="11" fill="#525252">$1,500+</text>

  <text x="50" y="390" text-anchor="middle" font-size="13" fill="#1c1a17" font-weight="700" transform="rotate(-90 50 390)">Empirical evidence →</text>
  <text x="100" y="650" text-anchor="end" font-size="11" fill="#525252">None</text>
  <text x="100" y="455" text-anchor="end" font-size="11" fill="#525252">Pending</text>
  <text x="100" y="260" text-anchor="end" font-size="11" fill="#525252">Documented</text>
  <text x="100" y="130" text-anchor="end" font-size="11" fill="#525252">Validated</text>

  <line x1="120" y1="455" x2="1180" y2="455" class="grid"/>
  <line x1="120" y1="260" x2="1180" y2="260" class="grid"/>

  <!-- V3.3: cost ~$200/mo, evidence DOCUMENTED (failure modes well-known) -->
  <!-- $200 → x=120+200*0.706=261; evidence=DOCUMENTED → y=260 -->
  <circle cx="261" cy="260" r="40" class="v33" opacity="0.8"/>
  <text x="261" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">V3.3</text>
  <text x="261" y="272" text-anchor="middle" font-size="10" fill="#fff">~$200/mo</text>
  <text x="261" y="320" text-anchor="middle" font-size="10.5" fill="#dc2626" font-weight="700">CURRENT</text>
  <text x="261" y="335" text-anchor="middle" font-size="10" fill="#525252">documented bullish bias</text>

  <!-- V3.4.1: cost ~$200/mo, evidence PENDING (1 run resolves) -->
  <circle cx="261" cy="455" r="40" class="v34" opacity="0.8"/>
  <text x="261" y="453" text-anchor="middle" font-size="12" font-weight="700" fill="#0a0a09">V3.4.1</text>
  <text x="261" y="467" text-anchor="middle" font-size="10" fill="#0a0a09">~$200/mo</text>
  <text x="261" y="515" text-anchor="middle" font-size="10.5" fill="#d97706" font-weight="700">BUILT</text>
  <text x="261" y="530" text-anchor="middle" font-size="10" fill="#525252">awaiting empirical test</text>

  <!-- V4 worst-case: cost ~$1500/mo, no evidence -->
  <circle cx="1119" cy="640" r="48" class="v4" opacity="0.7"/>
  <text x="1119" y="638" text-anchor="middle" font-size="12" font-weight="700" fill="#0a0a09">V4 (worst)</text>
  <text x="1119" y="652" text-anchor="middle" font-size="10" fill="#0a0a09">~$1,500/mo</text>

  <!-- V4 best-case: cost ~$600/mo, no evidence -->
  <circle cx="544" cy="640" r="48" class="v4" opacity="0.5"/>
  <text x="544" y="638" text-anchor="middle" font-size="12" font-weight="700" fill="#0a0a09">V4 (best)</text>
  <text x="544" y="652" text-anchor="middle" font-size="10" fill="#0a0a09">~$600/mo</text>

  <!-- Annotation arrow showing V4's cost range -->
  <line x1="544" y1="700" x2="1119" y2="700" stroke="#16a34a" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="831" y="722" text-anchor="middle" font-size="11" font-style="italic" fill="#16a34a" font-weight="700">V4 cost range: $600-$1,500/mo (3-9x V3.3)</text>

  <!-- Decision arrow from V3.4.1 up to "validated" -->
  <line x1="290" y1="425" x2="290" y2="170" stroke="#16a34a" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="305" y="290" font-size="11" fill="#16a34a" font-weight="700">"works"</text>
  <text x="305" y="306" font-size="10" fill="#525252">→ ship</text>

  <!-- Decision arrow from V3.4.1 down/right to V4 if fails -->
  <path d="M 250 490 Q 400 600 500 640" stroke="#dc2626" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
  <text x="380" y="558" font-size="11" fill="#dc2626" font-weight="700">"fails"</text>
  <text x="380" y="574" font-size="10" fill="#525252">→ build V4</text>

  <!-- Sweet spot annotation -->
  <rect x="170" y="380" width="220" height="20" fill="#d1fae5" stroke="#16a34a" rx="4"/>
  <text x="280" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Test resolves architecture for $3-5</text>

  <!-- Bottom decision summary -->
  <g transform="translate(120,750)">
    <rect x="0" y="0" width="1060" height="70" fill="#f6f4ec" stroke="#dfd9c4" rx="6"/>
    <text x="14" y="22" font-size="12" font-weight="700" fill="#0a0a09">Decision protocol:</text>
    <text x="14" y="42" font-size="11" fill="#1c1a17">1. Run V3.4.1 on MU once → ~$3-5 → 30-60s → results in.</text>
    <text x="14" y="58" font-size="11" fill="#1c1a17">2. Evaluate against 4 falsifiable criteria. ≥3 pass → V3.4.1 ships, $200/mo. &lt;3 pass → build V4, $600-$1,500/mo. The empirical test is decisive.</text>
  </g>
</svg>
