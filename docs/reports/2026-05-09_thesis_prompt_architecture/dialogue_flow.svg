<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <style>
      .heading { font-size: 22px; font-weight: 700; fill: #1c1a17; }
      .subheading { font-size: 13px; fill: #57534e; font-style: italic; }
      .agent-strategic { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.8; }
      .agent-tactical { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.8; }
      .callosum { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .term-agreed { fill: #d1fae5; stroke: #16a34a; stroke-width: 2; }
      .term-stuck { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .lane-label { font-size: 13px; font-weight: 700; fill: #57534e; text-transform: uppercase; letter-spacing: 0.05em; }
      .turn-label { font-size: 11px; fill: #525252; font-style: italic; }
      .msg-text { font-size: 10.5px; fill: #1c1a17; }
      .msg-mono { font-family: ui-monospace, monospace; font-size: 10.5px; fill: #525252; }
      .arrow-fwd { stroke: #525252; stroke-width: 1.5; fill: none; }
      .arrow-rev { stroke: #d97706; stroke-width: 1.5; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="1500" height="1000" fill="#fcfcfa"/>

  <text x="750" y="34" text-anchor="middle" class="heading">V4 dialogue protocol — bounded 3-round, terminate on AGREED / STUCK / MAX</text>
  <text x="750" y="56" text-anchor="middle" class="subheading">Strategic and Tactical agents converse via the corpus callosum until they reach mutual agreement or explicit unresolved disagreement.</text>

  <!-- Lanes -->
  <text x="60" y="100" class="lane-label">Strategic A</text>
  <text x="750" y="100" text-anchor="middle" class="lane-label">Corpus Callosum</text>
  <text x="1440" y="100" text-anchor="end" class="lane-label">Tactical B</text>

  <line x1="200" y1="110" x2="200" y2="950" stroke="#dfd9c4" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="700" y1="110" x2="700" y2="950" stroke="#dfd9c4" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="800" y1="110" x2="800" y2="950" stroke="#dfd9c4" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="1300" y1="110" x2="1300" y2="950" stroke="#dfd9c4" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Round 1 -->
  <text x="80" y="150" font-size="14" font-weight="700" fill="#7c3aed">Round 1 — parallel, blind</text>
  <text x="1420" y="150" text-anchor="end" font-size="14" font-weight="700" fill="#2563eb">Round 1 — parallel, blind</text>

  <rect x="40" y="160" width="660" height="100" rx="8" class="agent-strategic"/>
  <text x="60" y="184" font-size="12" font-weight="700">A.run(strategic_context)</text>
  <text x="60" y="204" class="msg-text">Output: "MU is in HBM/AI super-cycle. Sector thesis = STRONG. Cycle</text>
  <text x="60" y="220" class="msg-text">direction = up over 2-3 years. Named drivers: HBM4 to Vera Rubin,</text>
  <text x="60" y="236" class="msg-text">FY27 SCAs, Idaho fab supply tightness through 2027. Thesis-level</text>
  <text x="60" y="252" class="msg-text">risks: AI capex pullback, China supply disruption."</text>
  <text x="660" y="252" text-anchor="end" class="msg-mono" fill="#7c3aed">[STATE: PROPOSING]</text>

  <rect x="800" y="160" width="660" height="100" rx="8" class="agent-tactical"/>
  <text x="820" y="184" font-size="12" font-weight="700">B.run(tactical_context)</text>
  <text x="820" y="204" class="msg-text">Output: "Stock at $746 after 9x in 12mo. NTM EPS consensus ~$91.</text>
  <text x="820" y="220" class="msg-text">Historical memory peak P/E: 12-14x. Currently trades 14.6x FY26.</text>
  <text x="820" y="236" class="msg-text">Loss scenario at 22%: cycle peaks Q3 FY27, EPS cut 40%, multiple</text>
  <text x="820" y="252" class="msg-text">to 8x → stock $400. Tactical verdict: MEDIUM 12% at $746 (or HIGH</text>
  <text x="820" y="268" class="msg-text">below $620). At current price the trade-asymmetry is poor."</text>
  <text x="1450" y="252" text-anchor="end" class="msg-mono" fill="#2563eb">[STATE: PROPOSING]</text>

  <!-- Callosum carries forward -->
  <rect x="710" y="170" width="80" height="80" rx="40" class="callosum"/>
  <text x="750" y="200" text-anchor="middle" font-size="11" font-weight="700">CC</text>
  <text x="750" y="220" text-anchor="middle" font-size="9.5">pass-through</text>
  <text x="750" y="234" text-anchor="middle" font-size="9.5">A↔B</text>

  <line x1="700" y1="210" x2="710" y2="210" class="arrow-fwd" marker-end="url(#arrow)"/>
  <line x1="800" y1="210" x2="790" y2="210" class="arrow-fwd" marker-end="url(#arrow)"/>

  <!-- Round 2 -->
  <text x="80" y="320" font-size="14" font-weight="700" fill="#7c3aed">Round 2 — each sees the other</text>
  <text x="1420" y="320" text-anchor="end" font-size="14" font-weight="700" fill="#2563eb">Round 2 — each sees the other</text>

  <rect x="40" y="330" width="660" height="120" rx="8" class="agent-strategic"/>
  <text x="60" y="354" font-size="12" font-weight="700">A.run(seen=[B_round1])</text>
  <text x="60" y="376" class="msg-text">"B's loss scenario probability of 22% is base-rate-defensible</text>
  <text x="60" y="392" class="msg-text">(commodity cyclicals turn every 4-6yr). Strategic thesis intact —</text>
  <text x="60" y="408" class="msg-text">HBM super-cycle is real — but B is right that entry timing at</text>
  <text x="60" y="424" class="msg-text">$746 already prices most of the strategic story. I revise: thesis</text>
  <text x="60" y="440" class="msg-text">conviction stays HIGH, but trade conviction MEDIUM at this price."</text>
  <text x="660" y="440" text-anchor="end" class="msg-mono" fill="#16a34a">[STATE: AGREED]</text>

  <rect x="800" y="330" width="660" height="120" rx="8" class="agent-tactical"/>
  <text x="820" y="354" font-size="12" font-weight="700">B.run(seen=[A_round1])</text>
  <text x="820" y="376" class="msg-text">"A's HBM-supercycle framing is strong — Vera Rubin SCAs are real</text>
  <text x="820" y="392" class="msg-text">structural. I widen multiple range high-end from 14x to 16x to</text>
  <text x="820" y="408" class="msg-text">reflect that, but historical peak hard ceiling stays 17.5x</text>
  <text x="820" y="424" class="msg-text">(carve-out +25%). Loss scenario unchanged. Thesis target rises</text>
  <text x="820" y="440" class="msg-text">slightly to $1,100 reflecting wider multiple range. Sizing same."</text>
  <text x="1450" y="440" text-anchor="end" class="msg-mono" fill="#16a34a">[STATE: AGREED]</text>

  <line x1="700" y1="380" x2="710" y2="380" class="arrow-rev" marker-end="url(#arrow-amber)"/>
  <line x1="800" y1="380" x2="790" y2="380" class="arrow-rev" marker-end="url(#arrow-amber)"/>

  <rect x="710" y="340" width="80" height="80" rx="40" class="callosum"/>
  <text x="750" y="370" text-anchor="middle" font-size="11" font-weight="700">CC</text>
  <text x="750" y="386" text-anchor="middle" font-size="9.5">carries</text>
  <text x="750" y="398" text-anchor="middle" font-size="9.5">B → A</text>
  <text x="750" y="412" text-anchor="middle" font-size="9.5">A → B</text>

  <!-- Termination check -->
  <g transform="translate(450,490)">
    <rect x="0" y="0" width="600" height="80" rx="8" fill="#f6f4ec" stroke="#525252" stroke-width="1.5"/>
    <text x="300" y="24" text-anchor="middle" font-size="13" font-weight="700">Termination check after Round 2</text>
    <text x="300" y="46" text-anchor="middle" font-size="11">Both emit STATE: AGREED → terminate dialogue → synthesize</text>
    <text x="300" y="64" text-anchor="middle" font-size="11">(If either STUCK: forced final round + structured-disagreement output)</text>
  </g>

  <!-- Final synthesis -->
  <g transform="translate(280,610)">
    <rect class="term-agreed" x="0" y="0" width="950" height="180" rx="8"/>
    <text x="475" y="28" text-anchor="middle" font-size="14" font-weight="700">Final output (BOTH AGREED case)</text>
    <text x="475" y="50" text-anchor="middle" font-size="12" fill="#16a34a">corpus_callosum_synthesizer (Haiku call, ~$0.05)</text>

    <text x="40" y="86" font-size="11.5" font-weight="700">Thesis output:</text>
    <text x="40" y="106" class="msg-mono">thesis_target: $1,100   conviction_thesis: HIGH</text>
    <text x="40" y="124" class="msg-mono">trade_target:  $1,100   conviction_trade:  MEDIUM (12% at $746)</text>
    <text x="40" y="142" class="msg-mono">buy_below: $620         loss_scenario: $400 @ 22% probability</text>
    <text x="40" y="160" class="msg-text" fill="#525252">Strategic A &amp; Tactical B converged after 2 rounds. Both endorsed.</text>
  </g>

  <!-- STUCK alternative -->
  <g transform="translate(40,820)">
    <rect class="term-stuck" x="0" y="0" width="1420" height="120" rx="8"/>
    <text x="710" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">Final output (STUCK case — alternative)</text>
    <text x="710" y="50" text-anchor="middle" font-size="11.5" font-style="italic">If after Round 3, A and B remain in disagreement, structured DISAGREEMENT is itself the output:</text>
    <text x="40" y="80" class="msg-mono" fill="#dc2626">{ "structured_disagreement": true,</text>
    <text x="40" y="96" class="msg-mono" fill="#dc2626">  "strategic_a": { "conviction": "HIGH", "thesis_target": 1300, "rationale": "HBM super-cycle..." },</text>
    <text x="40" y="112" class="msg-mono" fill="#dc2626">  "tactical_b":  { "conviction": "BROKEN", "rationale": "entry at $746 violates historical-peak anchor; wait for $620 or below" } }</text>
  </g>
</svg>
