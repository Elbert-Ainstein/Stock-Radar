<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 1100" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <style>
      .heading { font-size: 22px; font-weight: 700; fill: #1c1a17; }
      .subheading { font-size: 13px; fill: #57534e; font-style: italic; }
      .arch-current { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.8; }
      .arch-v34 { fill: #fef3c7; stroke: #d97706; stroke-width: 1.8; }
      .arch-v4 { fill: #d1fae5; stroke: #16a34a; stroke-width: 1.8; }
      .agent-strategic { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.5; }
      .agent-tactical { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
      .callosum { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .step-old { fill: #f5f5f4; stroke: #78716c; stroke-width: 1; }
      .step-new { fill: #d1fae5; stroke: #16a34a; stroke-width: 1.5; }
      .step-killed { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
      .arch-title { font-size: 16px; font-weight: 700; fill: #0a0a09; }
      .arch-mono { font-family: ui-monospace, monospace; font-size: 10.5px; fill: #525252; }
      .arch-label { font-size: 11px; fill: #1c1a17; }
      .arch-cost { font-size: 12px; font-weight: 700; }
      .conn { stroke: #525252; stroke-width: 1.4; fill: none; }
      .conn-strong { stroke: #16a34a; stroke-width: 2.2; fill: none; }
      .conn-bidir { stroke: #d97706; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
    <marker id="arrow-bidir" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="1700" height="1100" fill="#fcfcfa"/>

  <text x="850" y="34" text-anchor="middle" class="heading">Thesis prompt architecture — V3.3 → V3.4.1 → V4</text>
  <text x="850" y="56" text-anchor="middle" class="subheading">Three architectures side-by-side. Strategic / tactical separation increases left to right; cost increases left to right; empirical evidence is opposite (most evidence at left, least at right).</text>

  <!-- V3.3 (current production) -->
  <g transform="translate(40,90)">
    <rect class="arch-current" x="0" y="0" width="510" height="940" rx="8"/>
    <text class="arch-title" x="255" y="32" text-anchor="middle">V3.3 — Current production</text>
    <text class="arch-cost" x="255" y="54" text-anchor="middle" fill="#dc2626">~$3-5 / ticker · 1 LLM call · No persona separation</text>

    <!-- Single agent block -->
    <rect x="80" y="80" width="350" height="80" rx="6" fill="#fcfcfa" stroke="#525252" stroke-width="1.5"/>
    <text x="255" y="106" text-anchor="middle" font-size="13" font-weight="700">"Lead investor" persona (single voice)</text>
    <text x="255" y="124" text-anchor="middle" font-size="11" fill="#525252">"Do not hedge. Produce a target. Defend it."</text>
    <text x="255" y="140" text-anchor="middle" font-size="11" fill="#525252">"Thesis playing out IS expected case"</text>
    <text x="255" y="156" text-anchor="middle" font-size="11" font-style="italic" fill="#dc2626">→ pre-commits to bullish posture before Step 1</text>

    <!-- 12 steps -->
    <g transform="translate(60,180)">
      <rect class="step-old" x="0" y="0" width="390" height="640" rx="4"/>
      <text x="195" y="22" text-anchor="middle" font-size="12" font-weight="700">12-step framework</text>
      <text x="20" y="48" font-size="10.5" font-family="ui-monospace, monospace">Step 0  Research (web search)</text>
      <text x="20" y="68" font-size="10.5" font-family="ui-monospace, monospace">Step 1  5 filters (demand, ceiling, ...)</text>
      <text x="20" y="88" font-size="10.5" font-family="ui-monospace, monospace">Step 2  Revenue build (anchored)</text>
      <text x="20" y="108" font-size="10.5" font-family="ui-monospace, monospace">Step 3  Margin trajectory</text>
      <text x="20" y="128" font-size="10.5" font-family="ui-monospace, monospace">Step 4  Earnings power → quarterly EPS</text>
      <text x="20" y="148" font-size="10.5" font-family="ui-monospace, monospace">Step 5  Multiple selection</text>
      <text x="20" y="168" font-size="10.5" font-family="ui-monospace, monospace" fill="#dc2626">Step 6  NTM EPS + OPTIONAL +10% beat ⚠</text>
      <text x="20" y="188" font-size="10.5" font-family="ui-monospace, monospace">Step 7  Thesis target</text>
      <text x="20" y="208" font-size="10.5" font-family="ui-monospace, monospace" fill="#dc2626">Step 8  Risks (no required loss) ⚠</text>
      <text x="20" y="228" font-size="10.5" font-family="ui-monospace, monospace">Step 9  Risk-adjusted EV</text>
      <text x="20" y="248" font-size="10.5" font-family="ui-monospace, monospace">Step 10 Catalysts</text>
      <text x="20" y="268" font-size="10.5" font-family="ui-monospace, monospace">Step 11 Breakout price</text>
      <text x="20" y="288" font-size="10.5" font-family="ui-monospace, monospace">Step 12 Conviction + sizing</text>

      <text x="20" y="330" font-size="11" fill="#dc2626" font-weight="700">Empirical failures today:</text>
      <text x="20" y="348" font-size="10.5" fill="#1c1a17">• Beat-adjustment double-count: +$143</text>
      <text x="20" y="366" font-size="10.5" fill="#1c1a17">• No risk produces a loss from $746</text>
      <text x="20" y="384" font-size="10.5" fill="#1c1a17">• Multiple-by-analogy (TSMC for memory)</text>
      <text x="20" y="402" font-size="10.5" fill="#1c1a17">• No cycle-position check after 9x run</text>
      <text x="20" y="420" font-size="10.5" fill="#1c1a17">• Persona pre-commits to bullish defense</text>

      <text x="20" y="460" font-size="11" font-weight="700" fill="#dc2626">Outputs (today, MU):</text>
      <text x="20" y="478" font-size="10.5" font-family="ui-monospace, monospace">$1,180 (contaminated, partial-patch)</text>
      <text x="20" y="496" font-size="10.5" font-family="ui-monospace, monospace">$1,300 (contaminated, full-patch)</text>
      <text x="20" y="514" font-size="10.5" font-family="ui-monospace, monospace" font-weight="700">$1,575 (CLEAN — gap WIDENED)</text>
      <text x="20" y="532" font-size="10.5" font-family="ui-monospace, monospace">$855 (hand-paste reference)</text>

      <text x="20" y="572" font-size="11" font-weight="700" fill="#16a34a">Empirical evidence: HIGH</text>
      <text x="20" y="590" font-size="10.5" fill="#525252">→ 4 runs, 2-day audit trail</text>
      <text x="20" y="608" font-size="10.5" fill="#525252">→ Squad-reviewed twice</text>
      <text x="20" y="626" font-size="10.5" fill="#525252">→ Failure modes documented</text>
    </g>
  </g>

  <!-- V3.4.1 (text persona split) -->
  <g transform="translate(595,90)">
    <rect class="arch-v34" x="0" y="0" width="510" height="940" rx="8"/>
    <text class="arch-title" x="255" y="32" text-anchor="middle">V3.4.1 — Text persona split</text>
    <text class="arch-cost" x="255" y="54" text-anchor="middle" fill="#d97706">~$3-5 / ticker · 1 LLM call · Soft persona separation</text>

    <!-- Persona split -->
    <g transform="translate(50,80)">
      <rect x="0" y="0" width="180" height="80" rx="6" class="agent-strategic"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="700">STRATEGIC mode</text>
      <text x="90" y="38" text-anchor="middle" font-size="10">战略上藐视敌人</text>
      <text x="90" y="56" text-anchor="middle" font-size="9.5">Sector, cycle direction</text>
      <text x="90" y="70" text-anchor="middle" font-size="9.5">structural thesis</text>

      <rect x="230" y="0" width="180" height="80" rx="6" class="agent-tactical"/>
      <text x="320" y="22" text-anchor="middle" font-size="12" font-weight="700">TACTICAL mode</text>
      <text x="320" y="38" text-anchor="middle" font-size="10">战术上重视敌人</text>
      <text x="320" y="56" text-anchor="middle" font-size="9.5">Specific trade,</text>
      <text x="320" y="70" text-anchor="middle" font-size="9.5">numbers, entry timing</text>

      <text x="205" y="100" text-anchor="middle" font-size="11" font-style="italic" fill="#d97706">Both inside one prompt — text instructions</text>
    </g>

    <!-- 12 steps with diffs -->
    <g transform="translate(60,200)">
      <rect class="step-old" x="0" y="0" width="390" height="620" rx="4"/>
      <text x="195" y="22" text-anchor="middle" font-size="12" font-weight="700">12-step framework + tactical guards</text>

      <text x="20" y="48" font-size="10.5" font-family="ui-monospace, monospace">Step 0  Research</text>
      <text x="20" y="68" font-size="10.5" font-family="ui-monospace, monospace">Step 1  5 filters</text>
      <text x="20" y="88" font-size="10.5" font-family="ui-monospace, monospace">Step 2  Revenue build</text>
      <text x="20" y="108" font-size="10.5" font-family="ui-monospace, monospace">Step 3  Margin trajectory</text>
      <text x="20" y="128" font-size="10.5" font-family="ui-monospace, monospace" fill="#16a34a">Step 4  + REQUIRED Street consensus anchor ✓</text>
      <text x="20" y="148" font-size="10.5" font-family="ui-monospace, monospace" fill="#16a34a">Step 5  + REQUIRED historical-peak anchor ✓</text>
      <text x="20" y="168" font-size="10.5" font-family="ui-monospace, monospace" fill="#16a34a">         + CARVE-OUT CEILING +25% ✓</text>
      <text x="20" y="188" font-size="10.5" font-family="ui-monospace, monospace" fill="#16a34a">Step 5b + CYCLE-POSITION CHECK at 200%+ ✓</text>
      <text x="20" y="208" font-size="10.5" font-family="ui-monospace, monospace" fill="#dc2626">Step 6  KILLED beat-adjustment double-count ✓</text>
      <text x="20" y="228" font-size="10.5" font-family="ui-monospace, monospace">Step 7  Thesis target</text>
      <text x="20" y="248" font-size="10.5" font-family="ui-monospace, monospace" fill="#16a34a">Step 8  + REQUIRED loss scenario ✓</text>
      <text x="20" y="268" font-size="10.5" font-family="ui-monospace, monospace" fill="#16a34a">         + MIN-WEIGHT 18-25% for cyclicals ✓</text>
      <text x="20" y="288" font-size="10.5" font-family="ui-monospace, monospace">Step 9-12 Standard</text>

      <text x="20" y="330" font-size="11" fill="#d97706" font-weight="700">Architectural risk:</text>
      <text x="20" y="348" font-size="10.5" fill="#1c1a17">Persona split via text — LLM may blend</text>
      <text x="20" y="366" font-size="10.5" fill="#1c1a17">"lead investor" with tactical mode and</text>
      <text x="20" y="384" font-size="10.5" fill="#1c1a17">treat constraints as compliance ritual.</text>
      <text x="20" y="402" font-size="10.5" fill="#1c1a17">(Red-team #4 finding — load-bearing)</text>

      <text x="20" y="442" font-size="11" font-weight="700" fill="#0a0a09">Outputs:</text>
      <text x="20" y="460" font-size="10.5" font-family="ui-monospace, monospace">[PENDING — empirical test]</text>
      <text x="20" y="478" font-size="10.5" fill="#525252">Falsifiable success criteria:</text>
      <text x="20" y="496" font-size="10.5" fill="#525252">• target &lt; $1,500</text>
      <text x="20" y="514" font-size="10.5" fill="#525252">• loss scenario at 15-25% prob</text>
      <text x="20" y="532" font-size="10.5" fill="#525252">• cycle-position honestly engaged</text>
      <text x="20" y="550" font-size="10.5" fill="#525252">• MEDIUM/BROKEN possible</text>

      <text x="20" y="592" font-size="11" font-weight="700" fill="#d97706">Empirical evidence: NONE YET</text>
      <text x="20" y="610" font-size="10.5" fill="#525252">→ 1 run resolves whether it's enough</text>
    </g>
  </g>

  <!-- V4 (two-agent + dialogue) -->
  <g transform="translate(1150,90)">
    <rect class="arch-v4" x="0" y="0" width="510" height="940" rx="8"/>
    <text class="arch-title" x="255" y="32" text-anchor="middle">V4 — Two-agent + dialoguing callosum</text>
    <text class="arch-cost" x="255" y="54" text-anchor="middle" fill="#16a34a">~$10-30 / ticker · 4-7 LLM calls · Hard persona separation</text>

    <!-- Agent A -->
    <g transform="translate(40,80)">
      <rect x="0" y="0" width="180" height="120" rx="8" class="agent-strategic"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="700">Agent A</text>
      <text x="90" y="38" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="700">STRATEGIC</text>
      <text x="90" y="58" text-anchor="middle" font-size="10">战略上藐视敌人</text>
      <text x="90" y="78" text-anchor="middle" font-size="9.5">Sector, cycle, structural</text>
      <text x="90" y="92" text-anchor="middle" font-size="9.5">thesis-level risks</text>
      <text x="90" y="108" text-anchor="middle" font-size="9.5" font-style="italic">Forbidden: targets, sizes</text>
    </g>

    <!-- Corpus callosum -->
    <g transform="translate(80,230)">
      <rect x="0" y="0" width="350" height="80" rx="40" class="callosum"/>
      <text x="175" y="22" text-anchor="middle" font-size="12" font-weight="700">Corpus Callosum (channel)</text>
      <text x="175" y="42" text-anchor="middle" font-size="10">Dialogue, NOT vote-counter</text>
      <text x="175" y="58" text-anchor="middle" font-size="10">Bounded 3-round protocol</text>
      <text x="175" y="74" text-anchor="middle" font-size="10">Termination: AGREED · STUCK · MAX</text>
    </g>

    <!-- Agent B -->
    <g transform="translate(290,80)">
      <rect x="0" y="0" width="180" height="120" rx="8" class="agent-tactical"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="700">Agent B</text>
      <text x="90" y="38" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="700">TACTICAL</text>
      <text x="90" y="58" text-anchor="middle" font-size="10">战术上重视敌人</text>
      <text x="90" y="78" text-anchor="middle" font-size="9.5">NTM EPS, multiple anchored,</text>
      <text x="90" y="92" text-anchor="middle" font-size="9.5">loss scenarios, sizing at price</text>
      <text x="90" y="108" text-anchor="middle" font-size="9.5" font-style="italic">Forbidden: validate A</text>
    </g>

    <!-- Bidirectional arrows between agents and callosum -->
    <line x1="130" y1="200" x2="130" y2="230" class="conn-bidir" marker-end="url(#arrow-bidir)"/>
    <line x1="380" y1="200" x2="380" y2="230" class="conn-bidir" marker-end="url(#arrow-bidir)"/>
    <line x1="130" y1="280" x2="130" y2="320" class="conn-bidir"/>
    <line x1="380" y1="280" x2="380" y2="320" class="conn-bidir"/>

    <!-- Final output -->
    <g transform="translate(80,350)">
      <rect x="0" y="0" width="350" height="120" rx="8" fill="#fcfcfa" stroke="#16a34a" stroke-width="2"/>
      <text x="175" y="22" text-anchor="middle" font-size="12" font-weight="700">Final output</text>
      <text x="175" y="44" text-anchor="middle" font-size="10.5">If both AGREED → unified thesis spec</text>
      <text x="175" y="60" text-anchor="middle" font-size="10.5">(corpus callosum synthesizer call)</text>
      <text x="175" y="86" text-anchor="middle" font-size="10.5" fill="#dc2626">If STUCK → STRUCTURED DISAGREEMENT</text>
      <text x="175" y="102" text-anchor="middle" font-size="10.5" fill="#dc2626">"A: HIGH, B: BROKEN at $X — wait for $Y"</text>
    </g>

    <!-- Properties -->
    <g transform="translate(40,500)">
      <text x="0" y="0" font-size="11" font-weight="700">All four V3.4.1 fixes carry over:</text>
      <text x="0" y="20" font-size="10.5">• Street consensus anchor → Agent B Step 4</text>
      <text x="0" y="38" font-size="10.5">• Historical-peak anchor → Agent B Step 5</text>
      <text x="0" y="56" font-size="10.5">• Loss-scenario min-weight → Agent B Step 8</text>
      <text x="0" y="74" font-size="10.5">• Cycle-position check → Agent B Step 5b</text>

      <text x="0" y="106" font-size="11" font-weight="700" fill="#16a34a">Architectural advantages:</text>
      <text x="0" y="124" font-size="10.5">• Persona separation is process-based</text>
      <text x="0" y="142" font-size="10.5">• Disagreement IS a valid output type</text>
      <text x="0" y="160" font-size="10.5">• Surfaces "thesis HIGH but trade BROKEN"</text>
      <text x="0" y="178" font-size="10.5">• Aligns with Hume's brain-hemisphere model</text>

      <text x="0" y="210" font-size="11" font-weight="700" fill="#dc2626">Risks:</text>
      <text x="0" y="228" font-size="10.5">• Anchoring drift across rounds</text>
      <text x="0" y="246" font-size="10.5">• Cost: 3-9x V3.3</text>
      <text x="0" y="264" font-size="10.5">• Debugging complexity (3 outputs)</text>

      <text x="0" y="296" font-size="11" font-weight="700" fill="#d97706">Empirical evidence: NONE</text>
      <text x="0" y="314" font-size="10.5">→ Design only; not yet built</text>
      <text x="0" y="332" font-size="10.5">→ Build only if V3.4.1 fails empirical test</text>
    </g>
  </g>

  <!-- Decision arrow at bottom -->
  <g transform="translate(40,1050)">
    <rect x="0" y="0" width="1620" height="40" fill="#f6f4ec" stroke="#dfd9c4" rx="4"/>
    <text x="14" y="26" font-size="12" fill="#1c1a17">
      <tspan font-weight="700">Decision path:</tspan>
      <tspan dx="20"> Run V3.4.1 on MU once (~$3-5) → evaluate against 4 falsifiable criteria → if ≥3 pass: V3.4.1 ships, defer V4 → if &lt;3 pass: build V4.</tspan>
      <tspan dx="20" font-weight="700" fill="#16a34a">Empirical test resolves architecture choice for $3-5.</tspan>
    </text>
  </g>
</svg>
